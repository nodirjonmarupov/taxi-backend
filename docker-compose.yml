version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taxi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    stop_signal: SIGINT
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/taxi_db
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-min-32-chars}
      - WEBAPP_BASE_URL=${WEBAPP_BASE_URL:-https://candid-semiexposed-dung.ngrok-free.dev}
      - GOOGLE_MAPS_JS_KEY=${GOOGLE_MAPS_JS_KEY:-}
      - GOOGLE_DIRECTIONS_API_KEY=${GOOGLE_DIRECTIONS_API_KEY:-}
      - ADMIN_IDS=${ADMIN_IDS:-[878590210,8219777626]}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-2002nm2002}
      - COMMISSION_PERCENTAGE=${COMMISSION_PERCENTAGE:-20.0}
      - DEBUG=${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
